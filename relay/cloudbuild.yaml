# Eliana Relay — Google Cloud Build + Cloud Run deployment
# Run: gcloud builds submit --config=relay/cloudbuild.yaml
#
# min-instances: 1 is set to prevent cold starts during hackathon judging/demo period.
# Remove or reduce after the demo period to save costs.

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/eliana-relay:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/eliana-relay:latest'
      - './relay'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/eliana-relay:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/eliana-relay:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'eliana-relay'
      - '--image=gcr.io/$PROJECT_ID/eliana-relay:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=3600'
      - '--set-env-vars=NODE_ENV=production'
      # TODO [Phase 2]: Add LIVE_PROVIDER_API_KEY via Secret Manager
      # '--set-secrets=LIVE_PROVIDER_API_KEY=eliana-live-provider-key:latest'

images:
  - 'gcr.io/$PROJECT_ID/eliana-relay:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/eliana-relay:latest'

options:
  logging: CLOUD_LOGGING_ONLY
